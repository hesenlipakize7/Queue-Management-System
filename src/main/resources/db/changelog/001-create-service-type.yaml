databaseChangeLog:
  - changeSet:
      id: 1
      author: pakize

      changes:

        - createTable:
            tableName: service_types

            columns:

              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(100)

              - column:
                  name: prefix
                  type: VARCHAR(10)